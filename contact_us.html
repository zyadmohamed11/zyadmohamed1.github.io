<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>personal Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="my courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact_us.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h2>Get In Touch</h2>
            <p>Have a question? Send us a message</p>
            
            <form action="#">
                <div class="form-group">
                    <label for="userName">Full Name:</label>
                    <input type="text" id="userName" name="userName" required>
                </div>
                
                <div class="form-group">
                    <label for="userEmail">Email Address:</label>
                    <input type="email" id="userEmail" name="userEmail" required>
                </div>

                <div class="form-group">
                    <label for="userMsg">Message:</label>
                    <textarea id="userMsg" name="userMsg" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="btn">Send Now</button>
            </form>
            </section>
    </main>

    <footer>
        <p>2026 Personal Course Organizer</p>
    </footer>

</body>
</html>
